# Django Api Boilerplate Configuration

app:
  name: "Django Api Boilerplate"
  version: "2.0.0"
  debug: false

features:
  - DRF
  - Celery
  - JWT
  - Tests

tech_stack:
  - Django
  - DRF
  - Celery
  - Redis

server:
  host: "0.0.0.0"
  port: 8000
  workers: 4

logging:
  level: INFO
  format: "%(asctime)s | %(levelname)s | %(message)s"
